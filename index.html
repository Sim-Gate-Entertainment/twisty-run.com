<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="canonical" href="https://twisty-run.com/" />
  <title>Twisty Race : Rider Cat</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      background: url('images/Loadingscreen_twisty_race_1024x500.png') no-repeat center center/cover;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
    }

    .store-btns {
      display: flex;
      gap: 16px;
      margin-bottom: 40px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .store-btns a img {
      height: 60px;
      width: auto;
      transition: transform 0.2s ease;
    }

    .store-btns a img:hover {
      transform: scale(1.05);
    }

    .video-wrapper {
      margin-bottom: 24px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      width: min(560px, 90vw);
      aspect-ratio: 16 / 9;
    }

    .video-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <div class="video-wrapper">
    <iframe
      src="https://www.youtube.com/embed/lVteaW3lSBA"
      title="Twisty Race : Rider Cat — Gameplay Trailer"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>

  <div class="store-btns">
    <a href="https://play.google.com/store/apps/details?id=com.TumbaGames.TwistyRun" target="_blank" rel="noopener">
      <img src="images/Google_Play_Store_badge_EN.svg" alt="Get it on Google Play">
    </a>
    <a href="https://apps.apple.com/pl/app/twisty-race/id6758782634" target="_blank" rel="noopener">
      <img src="images/App_Store_Badge_EN.svg" alt="Download on the App Store">
    </a>
  </div>

</body>
</html>
